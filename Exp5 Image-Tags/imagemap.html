<!DOCTYPE html>
<html>
<head>
<title>Image Map Example</title>
</head>
<body>

    

<h2>Image Map Example</h2>

<img src="flowers.jpg" usemap="#flowermap" width="400" height="300">

<map name="flowermap">
    <area shape="rect" coords="34,44,200,200" href="rose.html" alt="Rose">
    <area shape="circle" coords="300,150,50" href="lotus.html" alt="Lotus">
</map>

</body>
</html>
