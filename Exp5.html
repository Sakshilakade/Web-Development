<h1>Create Webpage to Include Image Using HTML Tag</h1>

<!-- ✅ Text as a Link -->
<h2>Text as a Link</h2>
<a href="https://www.w3schools.com/" target="_blank">
    Visit W3Schools.com!
</a>

<!-- ✅ Image as a Link -->
<h2>Image as a Link</h2>
<a href="https://www.wikipedia.org/" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png"
         alt="Wikipedia"
         width="300">
</a>

<!-- ✅ Image Map -->
<h2>Image Map Example</h2>
<img src="https://www.w3schools.com/html/workplace.jpg"
     alt="Workplace"
     usemap="#workmap"
     width="400">

<map name="workmap">
    <area shape="rect" coords="34,44,270,350"
          href="https://www.google.com"
          alt="Computer">

    <area shape="rect" coords="290,172,333,250"
          href="https://www.wikipedia.org"
          alt="Phone">

    <area shape="circle" coords="337,300,44"
          href="https://www.youtube.com"
          alt="Coffee">
</map>

</body>
