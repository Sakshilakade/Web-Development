<!DOCTYPE html>
<html>
<head>
    <title>Image Map Example</title>
</head>

<body>

<h2>Image Map Example</h2>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/36/Hopetoun_falls.jpg"
     usemap="#flowermap"
     width="400"
     height="300">

<map name="flowermap">

    <area shape="rect"
          coords="50,50,200,200"
          href="rose.html"
          alt="Rose">

    <area shape="circle"
          coords="300,150,50"
          href="lotus.html"
          alt="Lotus">

</map>

</body>
</html>
